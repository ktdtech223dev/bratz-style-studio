<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" class="gacha-capsule capsule-legendary">
  <defs>
    <radialGradient id="legend-top" cx="0.4" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <radialGradient id="legend-bottom" cx="0.4" cy="0.55" r="0.55">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="60%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#B45309"/>
    </radialGradient>
    <linearGradient id="legend-seam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="rainbow-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="16%" stop-color="#FF9F43"/>
      <stop offset="33%" stop-color="#FECA57"/>
      <stop offset="50%" stop-color="#48DBFB"/>
      <stop offset="66%" stop-color="#A29BFE"/>
      <stop offset="83%" stop-color="#FF6BCB"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
    <radialGradient id="legend-glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0"/>
      <stop offset="60%" stop-color="#FBBF24" stop-opacity="0"/>
      <stop offset="80%" stop-color="#FBBF24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="legend-shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#92400E" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="40" cy="40" r="38" fill="url(#legend-glow)"/>

  <!-- Rainbow shimmer ring -->
  <circle cx="40" cy="40" r="34" fill="none" stroke="url(#rainbow-ring)" stroke-width="2" opacity="0.45"/>

  <g filter="url(#legend-shadow)">
    <!-- Top half -->
    <path d="M15,40 C15,20 25,8 40,8 C55,8 65,20 65,40 Z" fill="url(#legend-top)"/>
    <!-- Bottom half -->
    <path d="M15,40 C15,60 25,72 40,72 C55,72 65,60 65,40 Z" fill="url(#legend-bottom)"/>
    <!-- Seam line -->
    <ellipse cx="40" cy="40" rx="25" ry="3" fill="url(#legend-seam)"/>
    <!-- Highlight shine -->
    <ellipse cx="30" cy="25" rx="10" ry="8" fill="white" opacity="0.4" transform="rotate(-15,30,25)"/>
    <ellipse cx="28" cy="22" rx="5" ry="3" fill="white" opacity="0.6" transform="rotate(-15,28,22)"/>
    <!-- Rim light -->
    <path d="M18,35 C18,18 28,10 40,10" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Star burst - 4 pointed star behind -->
  <g opacity="0.5">
    <path d="M40,2 L43,30 L40,26 L37,30 Z" fill="#FDE68A"/>
    <path d="M40,78 L43,50 L40,54 L37,50 Z" fill="#FDE68A"/>
    <path d="M2,40 L30,37 L26,40 L30,43 Z" fill="#FDE68A"/>
    <path d="M78,40 L50,37 L54,40 L50,43 Z" fill="#FDE68A"/>
    <!-- Diagonal rays -->
    <path d="M12,12 L32,33 L29,31 L31,29 Z" fill="#FBBF24" opacity="0.4"/>
    <path d="M68,12 L48,33 L51,31 L49,29 Z" fill="#FBBF24" opacity="0.4"/>
    <path d="M12,68 L32,47 L29,49 L31,51 Z" fill="#FBBF24" opacity="0.4"/>
    <path d="M68,68 L48,47 L51,49 L49,51 Z" fill="#FBBF24" opacity="0.4"/>
  </g>

  <!-- Sparkle particles -->
  <g fill="white">
    <circle cx="20" cy="15" r="1.2" opacity="0.8"/>
    <circle cx="60" cy="12" r="1" opacity="0.7"/>
    <circle cx="10" cy="45" r="0.8" opacity="0.6"/>
    <circle cx="70" cy="52" r="1" opacity="0.7"/>
    <circle cx="25" cy="70" r="0.8" opacity="0.6"/>
    <circle cx="58" cy="68" r="1.2" opacity="0.8"/>
  </g>

  <!-- Cross sparkles -->
  <g stroke="white" stroke-width="0.8" opacity="0.75">
    <line x1="15" y1="20" x2="15" y2="26"/>
    <line x1="12" y1="23" x2="18" y2="23"/>
    <line x1="65" y1="60" x2="65" y2="66"/>
    <line x1="62" y1="63" x2="68" y2="63"/>
  </g>

  <!-- Rainbow shimmer dots -->
  <circle cx="22" cy="32" r="1" fill="#FF6B6B" opacity="0.5"/>
  <circle cx="58" cy="28" r="1" fill="#48DBFB" opacity="0.5"/>
  <circle cx="18" cy="55" r="1" fill="#A29BFE" opacity="0.5"/>
  <circle cx="62" cy="48" r="1" fill="#FECA57" opacity="0.5"/>
</svg>