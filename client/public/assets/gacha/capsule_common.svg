<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" class="gacha-capsule capsule-common">
  <defs>
    <radialGradient id="common-top" cx="0.4" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#D0D0D0"/>
      <stop offset="60%" stop-color="#A8A8A8"/>
      <stop offset="100%" stop-color="#888888"/>
    </radialGradient>
    <radialGradient id="common-bottom" cx="0.4" cy="0.55" r="0.55">
      <stop offset="0%" stop-color="#B8B8B8"/>
      <stop offset="60%" stop-color="#909090"/>
      <stop offset="100%" stop-color="#707070"/>
    </radialGradient>
    <linearGradient id="common-seam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#808080"/>
      <stop offset="50%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
    <filter id="common-shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#common-shadow)">
    <!-- Top half -->
    <path d="M15,40 C15,20 25,8 40,8 C55,8 65,20 65,40 Z" fill="url(#common-top)"/>
    <!-- Bottom half -->
    <path d="M15,40 C15,60 25,72 40,72 C55,72 65,60 65,40 Z" fill="url(#common-bottom)"/>
    <!-- Seam line -->
    <ellipse cx="40" cy="40" rx="25" ry="3" fill="url(#common-seam)"/>
    <!-- Highlight shine -->
    <ellipse cx="30" cy="25" rx="10" ry="8" fill="white" opacity="0.3" transform="rotate(-15,30,25)"/>
    <ellipse cx="28" cy="22" rx="5" ry="3" fill="white" opacity="0.45" transform="rotate(-15,28,22)"/>
    <!-- Subtle rim light -->
    <path d="M18,35 C18,18 28,10 40,10" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  </g>
</svg>