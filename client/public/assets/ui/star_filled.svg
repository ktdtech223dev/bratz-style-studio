<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="ui-star star-filled">
  <defs>
    <linearGradient id="star-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE55C"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4A800"/>
    </linearGradient>
    <filter id="star-glow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.8" flood-color="#C8A000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#star-glow)">
    <!-- Star shape -->
    <polygon points="12,2 14.9,8.6 22,9.5 16.8,14.2 18.2,21.2 12,17.6 5.8,21.2 7.2,14.2 2,9.5 9.1,8.6" fill="url(#star-gold)" stroke="#C89E00" stroke-width="0.4"/>
    <!-- Top highlight facet -->
    <polygon points="12,2 14.9,8.6 12,7.5 9.1,8.6" fill="#FFF2A0" opacity="0.4"/>
    <!-- Left highlight -->
    <polygon points="12,2 9.1,8.6 2,9.5 7.2,14.2" fill="#FFE55C" opacity="0.2"/>
    <!-- Center shine -->
    <circle cx="11" cy="10" r="1.5" fill="white" opacity="0.25"/>
  </g>
</svg>