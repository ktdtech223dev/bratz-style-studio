<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="ui-star star-empty">
  <defs>
    <linearGradient id="star-empty-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
    <filter id="star-empty-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.5" flood-color="#888" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#star-empty-shadow)">
    <!-- Star outline -->
    <polygon points="12,2 14.9,8.6 22,9.5 16.8,14.2 18.2,21.2 12,17.6 5.8,21.2 7.2,14.2 2,9.5 9.1,8.6" fill="url(#star-empty-fill)" stroke="#B0B0B0" stroke-width="0.8"/>
    <!-- Subtle inner highlight -->
    <polygon points="12,4 14.2,9.2 20.2,10 16.2,13.8 17.4,19.8 12,16.6 6.6,19.8 7.8,13.8 3.8,10 9.8,9.2" fill="none" stroke="#C8C8C8" stroke-width="0.4" opacity="0.5"/>
    <!-- Top edge highlight -->
    <path d="M9.5,8.8 L12,3 L14.5,8.8" fill="none" stroke="white" stroke-width="0.5" opacity="0.4"/>
  </g>
</svg>