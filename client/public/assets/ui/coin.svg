<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="ui-coin">
  <defs>
    <radialGradient id="coin-face" cx="0.4" cy="0.38" r="0.55">
      <stop offset="0%" stop-color="#FFE55C"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C8A200"/>
    </radialGradient>
    <linearGradient id="coin-edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C200"/>
      <stop offset="50%" stop-color="#B8960A"/>
      <stop offset="100%" stop-color="#987A00"/>
    </linearGradient>
    <linearGradient id="coin-bevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF2A0"/>
      <stop offset="100%" stop-color="#D4AA00"/>
    </linearGradient>
    <filter id="coin-shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.8" flood-color="#7A6000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g filter="url(#coin-shadow)">
    <!-- Outer ring / edge -->
    <circle cx="16" cy="16.5" r="14" fill="url(#coin-edge)"/>
    <!-- Main coin face -->
    <circle cx="16" cy="16" r="13" fill="url(#coin-face)"/>
    <!-- Inner bevel ring -->
    <circle cx="16" cy="16" r="11" fill="none" stroke="url(#coin-bevel)" stroke-width="1.2"/>
    <!-- "B" emblem -->
    <text x="16" y="21.5" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#A08000" opacity="0.5">B</text>
    <text x="16" y="21" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FFF5B0">B</text>
    <!-- Top highlight arc -->
    <path d="M8,10 C10,6 14,4.5 18,5" fill="none" stroke="white" stroke-width="1" opacity="0.45" stroke-linecap="round"/>
    <!-- Small highlight dot -->
    <circle cx="10" cy="9" r="1.2" fill="white" opacity="0.5"/>
  </g>
</svg>