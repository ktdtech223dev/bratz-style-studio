    C141,362 143,368 148,375
    L150,380
    C148,390 145,400 144,408
    C142,420 143,430 148,438
    C155,450 165,458 178,462
    L180,465
    C175,472 168,480 160,490
    C150,502 142,515 138,528
    L140,530
    L260,530
    L262,528
    C258,515 250,502 240,490
    C232,480 225,472 220,465
    L222,462
    C235,458 245,450 252,438
    C257,430 258,420 256,408
    C255,400 252,390 250,380
    L252,375
    C257,368 259,362 260,355
    C262,340 260,328 252,310
    C245,295 235,290 232,290
    Z" fill="url(#cloe-skin)"/>
