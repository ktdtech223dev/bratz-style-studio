<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 560" width="200" height="560">
  <!-- CLOE "The Angel" — simple geometric Bratz style -->
  <!-- Skin:#F5CBA7  Eyes:#5DADE2  Lips:#E8739A  Hair:#F5E6C8 blonde -->

  <!-- GROUND SHADOW -->
  <ellipse cx="100" cy="548" rx="45" ry="8" fill="rgba(0,0,0,0.2)"/>

  <!-- 1. HAIR BACK (behind everything) -->
  <path d="M38 120 Q42 60 100 50 Q158 60 162 120 L165 280 Q155 310 148 300 Q150 240 150 160 L100 145 L50 160 Q50 240 52 300 Q45 310 35 280 Z" fill="#F5E6C8" stroke="#D4C090" stroke-width="1.5"/>

  <!-- 2. LEGS -->
  <rect x="80" y="340" width="18" height="170" rx="9" fill="#F5CBA7" stroke="#111" stroke-width="2"/>
  <rect x="102" y="340" width="18" height="170" rx="9" fill="#F5CBA7" stroke="#111" stroke-width="2"/>

  <!-- 3. FEET (bare, shoes drawn at step 16) -->
  <ellipse cx="87" cy="516" rx="18" ry="9" fill="#F5CBA7" stroke="#111" stroke-width="2"/>
  <ellipse cx="113" cy="516" rx="18" ry="9" fill="#F5CBA7" stroke="#111" stroke-width="2"/>

  <!-- 4. BODY TORSO -->
  <path d="M75 220 Q70 250 72 290 Q80 320 100 325 Q120 320 128 290 Q130 250 125 220 Q115 215 100 214 Q85 215 75 220 Z" fill="#F5CBA7" stroke="#111" stroke-width="2.5"/>

  <!-- 5. ARMS -->
  <rect x="58" y="222" width="16" height="85" rx="8" fill="#F5CBA7" stroke="#111" stroke-width="2" transform="rotate(-5 66 260)"/>
  <rect x="126" y="222" width="16" height="85" rx="8" fill="#F5CBA7" stroke="#111" stroke-width="2" transform="rotate(5 134 260)"/>

  <!-- 6. SKIRT -->
  <path d="M72 290 Q68 322 64 358 Q80 366 100 367 Q120 366 136 358 Q132 322 128 290 Q119 302 100 303 Q81 302 72 290 Z" fill="#FF8FAB" stroke="#CC5577" stroke-width="1.5"/>
  <path d="M64 358 Q80 368 100 369 Q120 368 136 358" fill="none" stroke="#CC5577" stroke-width="2"/>
  <!-- Skirt sparkle dots -->
  <circle cx="85" cy="330" r="2" fill="#FFD6E8"/>
  <circle cx="100" cy="340" r="2" fill="#FFD6E8"/>
  <circle cx="115" cy="330" r="2" fill="#FFD6E8"/>

  <!-- 7. CROP TOP -->
  <path d="M75 220 Q70 252 72 272 Q80 282 100 283 Q120 282 128 272 Q130 252 125 220 Q115 215 100 214 Q85 215 75 220 Z" fill="#FFD6E8" stroke="#CC5577" stroke-width="1.5"/>
  <!-- Top neckline trim -->
  <path d="M82 218 Q100 213 118 218" fill="none" stroke="#FF8FAB" stroke-width="2"/>
  <!-- Waist trim -->
  <path d="M74 268 Q100 275 126 268" fill="none" stroke="#FF8FAB" stroke-width="1.5"/>
  <!-- Tiny bow on top -->
  <path d="M95 222 Q100 218 105 222 Q100 225 95 222 Z" fill="#FF8FAB"/>
  <circle cx="100" cy="222" r="2" fill="#CC5577"/>

  <!-- Tiny puff sleeves -->
  <ellipse cx="66" cy="228" rx="12" ry="8" fill="#FFD6E8" stroke="#CC5577" stroke-width="1.5" transform="rotate(-5 66 228)"/>
  <ellipse cx="134" cy="228" rx="12" ry="8" fill="#FFD6E8" stroke="#CC5577" stroke-width="1.5" transform="rotate(5 134 228)"/>

  <!-- 8. NECK -->
  <rect x="91" y="200" width="18" height="24" rx="7" fill="#F5CBA7" stroke="#111" stroke-width="2"/>

  <!-- 9. HEAD -->
  <ellipse cx="100" cy="145" rx="68" ry="72" fill="#F5CBA7" stroke="#111" stroke-width="2.5"/>

  <!-- 10. CHEEKS -->
  <ellipse cx="72" cy="168" rx="14" ry="8" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="128" cy="168" rx="14" ry="8" fill="#FFB6C1" opacity="0.5"/>

  <!-- 11. EYEBROWS -->
  <path d="M73 138 Q82 132 91 136" fill="none" stroke="#3D2314" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M109 136 Q118 132 127 138" fill="none" stroke="#3D2314" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 12. EYES — LEFT -->
  <ellipse cx="83" cy="155" rx="16" ry="13" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="83" cy="157" rx="11" ry="11" fill="#5DADE2"/>
  <circle cx="83" cy="157" r="5" fill="#1a1a1a"/>
  <circle cx="87" cy="153" r="3" fill="white"/>
  <path d="M67 148 Q75 140 83 142 Q91 140 99 148 Q93 143 83 144 Q73 143 67 148 Z" fill="#111"/>
  <path d="M97 146 Q103 140 106 144 Q105 147 99 149 Z" fill="#111"/>

  <!-- 12. EYES — RIGHT -->
  <ellipse cx="117" cy="155" rx="16" ry="13" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="117" cy="157" rx="11" ry="11" fill="#5DADE2"/>
  <circle cx="117" cy="157" r="5" fill="#1a1a1a"/>
  <circle cx="121" cy="153" r="3" fill="white"/>
  <path d="M101 148 Q109 140 117 142 Q125 140 133 148 Q127 143 117 144 Q107 143 101 148 Z" fill="#111"/>
  <path d="M131 146 Q137 140 140 144 Q139 147 133 149 Z" fill="#111"/>

  <!-- 13. NOSE -->
  <path d="M96 170 Q100 174 104 170" fill="none" stroke="#C89060" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 14. LIPS — upper (cupid's bow) -->
  <path d="M86 182 Q90 178 100 180 Q110 178 114 182 Q108 183 100 184 Q92 183 86 182 Z" fill="#E8739A" stroke="#111" stroke-width="1.5"/>
  <!-- LIPS — lower (full) -->
  <path d="M86 182 Q88 192 100 194 Q112 192 114 182 Q108 183 100 184 Q92 183 86 182 Z" fill="#E8739A" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="100" cy="188" rx="7" ry="3" fill="white" opacity="0.5"/>

  <!-- 15. HAIR FRONT (over face) -->
  <path d="M60 100 Q70 75 100 68 Q130 75 140 100 Q130 90 100 88 Q70 90 60 100 Z" fill="#F5E6C8" stroke="#D4C090" stroke-width="1.5"/>
  <!-- Left face-framing strand -->
  <path d="M42 130 Q38 150 40 170 Q44 160 46 140 Z" fill="#F5E6C8"/>
  <!-- Right face-framing strand -->
  <path d="M158 130 Q162 150 160 170 Q156 160 154 140 Z" fill="#F5E6C8"/>

  <!-- 16. SHOES (pink strappy heels) -->
  <ellipse cx="87" cy="516" rx="18" ry="9" fill="#FF8FAB" stroke="#CC5577" stroke-width="2"/>
  <rect x="80" y="506" width="14" height="7" rx="3" fill="#FF8FAB" stroke="#CC5577" stroke-width="1.5"/>
  <ellipse cx="113" cy="516" rx="18" ry="9" fill="#FF8FAB" stroke="#CC5577" stroke-width="2"/>
  <rect x="106" y="506" width="14" height="7" rx="3" fill="#FF8FAB" stroke="#CC5577" stroke-width="1.5"/>

</svg>
