<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" class="character-body cloe-body">
  <defs>
    <linearGradient id="cloe-skin" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8BA96"/>
      <stop offset="35%" stop-color="#F5CBA7"/>
      <stop offset="100%" stop-color="#F0C09E"/>
    </linearGradient>
    <linearGradient id="cloe-skin-shadow" x1="0" y1="0" x2="1" y2="1">
