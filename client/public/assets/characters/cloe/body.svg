  <ellipse cx="200" cy="330" rx="35" ry="25" fill="url(#cloe-chest-highlight)" opacity="0.5"/>
  <!-- Torso shadow - left side -->
  <path class="torso-shadow-left" d="
    M168,290
    C165,290 155,295 148,310
