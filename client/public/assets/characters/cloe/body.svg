  <path class="collarbone-right" d="M225,292 C232,294 240,298 245,302" fill="none" stroke="#E0AD88" stroke-width="0.8" opacity="0.35"/>
  <!-- Belly button -->
  <ellipse cx="200" cy="418" rx="2.5" ry="4" fill="#E0AD88" opacity="0.4"/>
