  </defs>
  <!-- Neck -->
  <path class="neck" d="M188,258 C188,252 190,245 192,240 L208,240 C210,245 212,252 212,258 L212,290 L188,290 Z" fill="url(#cloe-skin)"/>
  <path class="neck-shadow" d="M192,258 C192,255 193,250 194,246 L198,246 L198,270 L192,270 Z" fill="#E0AD88" opacity="0.3"/>
  <!-- Torso main shape - tiny waist, hip curve -->
