  <path class="shoulder-left" d="M168,290 C158,288 148,292 140,300 C138,303 137,306 138,310 L148,310 C150,302 158,295 168,292 Z" fill="url(#cloe-skin)"/>
  <path class="shoulder-right" d="M232,290 C242,288 252,292 260,300 C262,303 263,306 262,310 L252,310 C250,302 242,295 232,292 Z" fill="url(#cloe-skin)"/>
