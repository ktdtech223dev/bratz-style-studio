<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" class="character-face cloe-face">
  <defs>
    <linearGradient id="cloe-face-skin" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FBE0C8"/>
      <stop offset="50%" stop-color="#F5CBA7"/>
      <stop offset="100%" stop-color="#EDBC99"/>
    </linearGradient>
    <radialGradient id="cloe-cheek-l" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F4A6B0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F4A6B0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloe-cheek-r" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F4A6B0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F4A6B0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cloe-iris-l" cx="0.45" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#8ED6F0"/>
      <stop offset="50%" stop-color="#5DADE2"/>
      <stop offset="100%" stop-color="#3B8FC2"/>
    </radialGradient>
    <radialGradient id="cloe-iris-r" cx="0.45" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#8ED6F0"/>
      <stop offset="50%" stop-color="#5DADE2"/>
      <stop offset="100%" stop-color="#3B8FC2"/>
    </radialGradient>
    <linearGradient id="cloe-lip-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2A0B0"/>
      <stop offset="50%" stop-color="#E8899A"/>
      <stop offset="100%" stop-color="#D47A8A"/>
    </linearGradient>
    <radialGradient id="cloe-lip-shine" cx="0.5" cy="0.25" r="0.4">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="cloe-face-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#C4956E" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Head shape - oversized oval (Bratz proportion ~40% of total height) -->
  <ellipse class="head-shape" cx="200" cy="148" rx="72" ry="90" fill="url(#cloe-face-skin)" filter="url(#cloe-face-shadow)"/>

  <!-- Ear left -->
  <ellipse cx="130" cy="155" rx="8" ry="14" fill="#F0C09E"/>
  <ellipse cx="131" cy="155" rx="5" ry="10" fill="#E8BA96" opacity="0.5"/>

  <!-- Ear right -->
  <ellipse cx="270" cy="155" rx="8" ry="14" fill="#F0C09E"/>
  <ellipse cx="269" cy="155" rx="5" ry="10" fill="#E8BA96" opacity="0.5"/>

  <!-- Face shadow contour -->
  <path d="M148,100 C140,130 135,160 140,190 C145,210 160,228 180,238 C190,242 200,243 210,242 C230,238 250,220 258,195 C264,170 262,135 254,108" fill="none" stroke="#D4A07A" stroke-width="0.5" opacity="0.2"/>

  <!-- Eyebrows - thin arched -->
  <path class="brow-left" d="M155,118 C160,110 172,107 184,112" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>
  <path class="brow-right" d="M216,112 C228,107 240,110 245,118" fill="none" stroke="#8B6914" stroke-width="2" stroke-linecap="round"/>

  <!-- Eye whites -->
  <ellipse class="eye-white-l" cx="172" cy="140" rx="22" ry="14" fill="white"/>
  <ellipse class="eye-white-r" cx="228" cy="140" rx="22" ry="14" fill="white"/>

  <!-- Irises - blue for Cloe -->
  <ellipse class="iris-l" cx="174" cy="141" rx="12" ry="12" fill="url(#cloe-iris-l)"/>
  <ellipse class="iris-r" cx="226" cy="141" rx="12" ry="12" fill="url(#cloe-iris-r)"/>

  <!-- Pupils -->
  <circle class="pupil-l" cx="175" cy="140" r="5.5" fill="#1A1A2E"/>
  <circle class="pupil-r" cx="225" cy="140" r="5.5" fill="#1A1A2E"/>

  <!-- Pupil highlights -->
  <circle cx="178" cy="137" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="228" cy="137" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="172" cy="143" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="222" cy="143" r="1.2" fill="white" opacity="0.5"/>

  <!-- Upper lash line - thick -->
  <path class="lash-line-l" d="M150,137 C155,127 165,123 175,124 C185,125 192,130 195,137" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <path class="lash-line-r" d="M205,137 C208,130 215,125 225,124 C235,123 245,127 250,137" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Individual lashes - left eye (6 lashes) -->
  <line x1="150" y1="136" x2="144" y2="128" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="155" y1="131" x2="150" y2="122" stroke="#1A1A1A" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="161" y1="127" x2="157" y2="117" stroke="#1A1A1A" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="168" y1="125" x2="166" y2="114" stroke="#1A1A1A" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="176" y1="124" x2="176" y2="113" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="184" y1="125" x2="187" y2="115" stroke="#1A1A1A" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Individual lashes - right eye (6 lashes) -->
  <line x1="216" y1="125" x2="213" y2="115" stroke="#1A1A1A" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="224" y1="124" x2="224" y2="113" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="232" y1="125" x2="234" y2="114" stroke="#1A1A1A" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="239" y1="127" x2="243" y2="117" stroke="#1A1A1A" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="245" y1="131" x2="250" y2="122" stroke="#1A1A1A" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="250" y1="136" x2="256" y2="128" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Lower lash line - subtle -->
  <path d="M154,146 C160,152 170,155 180,154 C187,153 192,150 194,146" fill="none" stroke="#3A3A3A" stroke-width="0.8" opacity="0.5"/>
  <path d="M206,146 C208,150 213,153 220,154 C230,155 240,152 246,146" fill="none" stroke="#3A3A3A" stroke-width="0.8" opacity="0.5"/>

  <!-- Nose - small upturned -->
  <path class="nose" d="M196,160 C195,165 194,172 193,176 C192,179 194,182 197,183 L200,184 L203,183 C206,182 208,179 207,176 C206,172 205,165 204,160" fill="none" stroke="#D4A07A" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="195" cy="182" r="2" fill="#EDBC99" stroke="#D4A07A" stroke-width="0.5"/>
  <circle cx="205" cy="182" r="2" fill="#EDBC99" stroke="#D4A07A" stroke-width="0.5"/>

  <!-- Cheek blush -->
  <ellipse cx="158" cy="170" rx="18" ry="12" fill="url(#cloe-cheek-l)"/>
  <ellipse cx="242" cy="170" rx="18" ry="12" fill="url(#cloe-cheek-r)"/>

  <!-- Lips - plump pouty, soft pink for Cloe -->
  <!-- Upper lip -->
  <path class="upper-lip" d="M183,198 C186,194 192,190 197,189 L200,188 L203,189 C208,190 214,194 217,198 C214,196 208,194 200,194 C192,194 186,196 183,198 Z" fill="url(#cloe-lip-grad)"/>
  <!-- Lower lip - plump -->
  <path class="lower-lip" d="M183,198 C186,200 192,208 200,210 C208,208 214,200 217,198 C214,196 208,194 200,194 C192,194 186,196 183,198 Z" fill="url(#cloe-lip-grad)"/>
  <!-- Lip shine -->
  <ellipse cx="200" cy="200" rx="10" ry="5" fill="url(#cloe-lip-shine)"/>
  <!-- Lip line -->
  <path d="M183,198 C190,196 195,195 200,195 C205,195 210,196 217,198" fill="none" stroke="#C4707E" stroke-width="0.6"/>
  <!-- Cupid's bow highlight -->
  <path d="M195,191 L200,188 L205,191" fill="none" stroke="#FBE0C8" stroke-width="0.8" opacity="0.5"/>

  <!-- Chin highlight -->
  <ellipse cx="200" cy="222" rx="12" ry="6" fill="#FBE0C8" opacity="0.2"/>

  <!-- Jaw shadow -->
  <path d="M145,180 C148,210 165,232 185,240 C195,244 205,244 215,240 C235,232 252,210 255,180" fill="none" stroke="#D4A07A" stroke-width="0.5" opacity="0.15"/>
</svg>