<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 700" class="character-legs cloe-legs">
  <defs>
    <linearGradient id="cloe-leg-l" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#E8BA96"/>
      <stop offset="40%" stop-color="#F5CBA7"/>
      <stop offset="100%" stop-color="#F0C09E"/>
    </linearGradient>
    <linearGradient id="cloe-leg-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8BA96"/>
      <stop offset="40%" stop-color="#F5CBA7"/>
      <stop offset="100%" stop-color="#F0C09E"/>
    </linearGradient>
    <linearGradient id="cloe-leg-shine-l" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#FBE0C8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FBE0C8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FBE0C8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cloe-leg-shine-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FBE0C8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FBE0C8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FBE0C8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Left leg - long, slender, Bratz-proportioned -->
  <g class="leg-left">
    <!-- Thigh -->
    <path d="
      M160,490
      C156,500 152,512 150,525
      C148,540 147,555 147,568
      C147,578 148,588 149,596
      L149,600
      C150,608 151,616 152,622
      L168,622
      C167,616 166,608 165,600
      L165,596
      C164,588 164,578 165,568
      C166,555 168,540 170,526
      C172,514 175,502 178,492
      Z" fill="url(#cloe-leg-l)"/>
    <!-- Shin -->
    <path d="
      M152,622
      C153,632 154,642 155,650
      C156,660 156,668 157,675
      L157,680
      L170,680
      L170,675
      C169,668 169,660 168,650
      C167,642 166,632 165,622
      Z" fill="url(#cloe-leg-l)"/>
    <!-- Thigh inner shadow -->
    <path d="M170,492 C168,502 166,515 165,528 C164,542 163,556 163,568 C163,575 163,582 164,588 L161,588 C160,581 160,574 160,567 C160,554 161,540 162,526 C163,513 165,500 168,490 Z" fill="#D4A07A" opacity="0.15"/>
    <!-- Knee highlight -->
    <ellipse cx="158" cy="610" rx="6" ry="8" fill="#FBE0C8" opacity="0.2"/>
    <!-- Knee crease -->
    <path d="M153,618 C156,616 160,615 164,616" fill="none" stroke="#D4A07A" stroke-width="0.6" opacity="0.25"/>
    <!-- Shin highlight/shine -->
    <path d="M155,630 C155,645 156,660 157,672 L160,672 C159,660 158,645 158,630 Z" fill="url(#cloe-leg-shine-l)"/>
  </g>

  <!-- Right leg - long, slender, Bratz-proportioned -->
  <g class="leg-right">
    <!-- Thigh -->
    <path d="
      M222,492
      C225,502 228,514 230,526
      C232,540 233,555 233,568
      C233,578 232,588 231,596
      L231,600
      C230,608 229,616 228,622
      L212,622
      C213,616 214,608 215,600
      L215,596
      C216,588 216,578 215,568
      C214,555 212,540 210,525
      C208,512 204,500 200,490
      Z" fill="url(#cloe-leg-r)"/>
    <!-- Shin -->
    <path d="
      M228,622
      C227,632 226,642 225,650
      C224,660 224,668 223,675
      L223,680
      L210,680
      L210,675
      C211,668 211,660 212,650
      C213,642 214,632 215,622
      Z" fill="url(#cloe-leg-r)"/>
    <!-- Thigh inner shadow -->
    <path d="M210,492 C212,502 214,515 215,528 C216,542 217,556 217,568 C217,575 217,582 216,588 L219,588 C220,581 220,574 220,567 C220,554 219,540 218,526 C217,513 215,500 212,490 Z" fill="#D4A07A" opacity="0.15"/>
    <!-- Knee highlight -->
    <ellipse cx="222" cy="610" rx="6" ry="8" fill="#FBE0C8" opacity="0.2"/>
    <!-- Knee crease -->
    <path d="M227,618 C224,616 220,615 216,616" fill="none" stroke="#D4A07A" stroke-width="0.6" opacity="0.25"/>
    <!-- Shin highlight/shine -->
    <path d="M225,630 C225,645 224,660 223,672 L220,672 C221,660 222,645 222,630 Z" fill="url(#cloe-leg-shine-r)"/>
  </g>
</svg>