  <rect x="58" y="222" width="16" height="85" rx="8" fill="#8B5E3C" stroke="#111" stroke-width="2" transform="rotate(-5 66 260)"/>
  <rect x="126" y="222" width="16" height="85" rx="8" fill="#8B5E3C" stroke="#111" stroke-width="2" transform="rotate(5 134 260)"/>

  <!-- 6. SHORTS (sporty/fierce style) -->
  <path d="M72 290 Q70 316 70 345 Q80 350 100 351 Q120 350 130 345 Q130 316 128 290 Q119 302 100 303 Q81 302 72 290 Z" fill="#E74C3C" stroke="#C0392B" stroke-width="1.5"/>
