  <ellipse cx="72" cy="168" rx="14" ry="8" fill="#FFB6C1" opacity="0.4"/>
  <ellipse cx="128" cy="168" rx="14" ry="8" fill="#FFB6C1" opacity="0.4"/>

  <!-- 11. EYEBROWS — bold, expressive -->
  <path d="M73 138 Q82 131 91 135" fill="none" stroke="#1a0a04" stroke-width="3" stroke-linecap="round"/>
  <path d="M109 135 Q118 131 127 138" fill="none" stroke="#1a0a04" stroke-width="3" stroke-linecap="round"/>

  <!-- 12. EYES — LEFT -->
  <ellipse cx="83" cy="155" rx="16" ry="13" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="83" cy="157" rx="11" ry="11" fill="#784212"/>
  <circle cx="83" cy="157" r="5" fill="#1a1a1a"/>
  <circle cx="87" cy="153" r="3" fill="white"/>
  <path d="M67 148 Q75 140 83 142 Q91 140 99 148 Q93 143 83 144 Q73 143 67 148 Z" fill="#111"/>
  <path d="M97 146 Q103 140 106 144 Q105 147 99 149 Z" fill="#111"/>

  <!-- 12. EYES — RIGHT -->
  <ellipse cx="117" cy="155" rx="16" ry="13" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="117" cy="157" rx="11" ry="11" fill="#784212"/>
  <circle cx="117" cy="157" r="5" fill="#1a1a1a"/>
  <circle cx="121" cy="153" r="3" fill="white"/>
  <path d="M101 148 Q109 140 117 142 Q125 140 133 148 Q127 143 117 144 Q107 143 101 148 Z" fill="#111"/>
  <path d="M131 146 Q137 140 140 144 Q139 147 133 149 Z" fill="#111"/>

  <!-- 13. NOSE -->
  <path d="M96 170 Q100 174 104 170" fill="none" stroke="#5C3A1E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 14. LIPS -->
  <path d="M86 182 Q90 178 100 180 Q110 178 114 182 Q108 183 100 184 Q92 183 86 182 Z" fill="#C8956C" stroke="#111" stroke-width="1.5"/>
  <path d="M86 182 Q88 192 100 194 Q112 192 114 182 Q108 183 100 184 Q92 183 86 182 Z" fill="#C8956C" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="100" cy="188" rx="7" ry="3" fill="white" opacity="0.5"/>

  <!-- 15. HAIR FRONT — afro front volume over forehead -->
  <!-- No straight hair front layer needed — afro ellipse already dominates -->
  <!-- Small front wisps at hairline -->
  <path d="M52 140 Q48 155 50 168 Q54 160 56 148 Z" fill="#2C1810"/>
  <path d="M148 140 Q152 155 150 168 Q146 160 144 148 Z" fill="#2C1810"/>
  <!-- Afro bottom fringe over temples -->
  <ellipse cx="47" cy="152" rx="12" ry="8" fill="#2C1810"/>
  <ellipse cx="153" cy="152" rx="12" ry="8" fill="#2C1810"/>

  <!-- 16. SHOES — sporty sneakers in red/gold -->
  <!-- Left sneaker -->
  <rect x="71" y="506" width="30" height="16" rx="6" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <ellipse cx="87" cy="516" rx="18" ry="7" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <!-- Sneaker sole -->
  <path d="M71 516 Q87 521 105 516" fill="none" stroke="#F39C12" stroke-width="2.5"/>
  <!-- Lace line -->
  <path d="M76 510 L100 510" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Right sneaker -->
  <rect x="99" y="506" width="30" height="16" rx="6" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <ellipse cx="113" cy="516" rx="18" ry="7" fill="#E74C3C" stroke="#C0392B" stroke-width="2"/>
  <path d="M95 516 Q113 521 131 516" fill="none" stroke="#F39C12" stroke-width="2.5"/>
  <path d="M102 510 L126 510" fill="none" stroke="white" stroke-width="1.5"/>

</svg>
