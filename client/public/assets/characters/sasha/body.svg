  <!-- 1. HAIR BACK — massive afro (drawn first, widest element) -->
  <ellipse cx="100" cy="110" rx="88" ry="85" fill="#2C1810" stroke="#1a0a04" stroke-width="2"/>
  <!-- Afro texture bumps on silhouette -->
  <circle cx="28" cy="95" r="10" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="20" cy="115" r="9" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="24" cy="138" r="8" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="35" cy="58" r="10" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="55" cy="32" r="11" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="80" cy="22" r="10" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="100" cy="20" r="11" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="120" cy="22" r="10" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="145" cy="32" r="11" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="165" cy="58" r="10" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="172" cy="95" r="10" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="178" cy="118" r="9" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <circle cx="174" cy="140" r="8" fill="#2C1810" stroke="#1a0a04" stroke-width="1.5"/>
  <!-- Afro highlight (sheen on left side) -->
  <ellipse cx="80" cy="85" rx="25" ry="20" fill="#4A2818" opacity="0.6"/>

  <!-- 2. LEGS -->
  <rect x="80" y="340" width="18" height="170" rx="9" fill="#8B5E3C" stroke="#111" stroke-width="2"/>
  <rect x="102" y="340" width="18" height="170" rx="9" fill="#8B5E3C" stroke="#111" stroke-width="2"/>

  <!-- 3. FEET -->
  <ellipse cx="87" cy="516" rx="18" ry="9" fill="#8B5E3C" stroke="#111" stroke-width="2"/>
  <ellipse cx="113" cy="516" rx="18" ry="9" fill="#8B5E3C" stroke="#111" stroke-width="2"/>

  <!-- 4. BODY TORSO -->
  <path d="M75 220 Q70 250 72 290 Q80 320 100 325 Q120 320 128 290 Q130 250 125 220 Q115 215 100 214 Q85 215 75 220 Z" fill="#8B5E3C" stroke="#111" stroke-width="2.5"/>

