  <path d="M76 222 Q74 252 74 270" fill="none" stroke="#F39C12" stroke-width="3" stroke-linecap="round"/>
  <path d="M124 222 Q126 252 126 270" fill="none" stroke="#F39C12" stroke-width="3" stroke-linecap="round"/>
  <!-- Gold star detail center -->
  <path d="M100 235 L102 242 L109 242 L103 247 L105 254 L100 249 L95 254 L97 247 L91 242 L98 242 Z" fill="#F39C12"/>
