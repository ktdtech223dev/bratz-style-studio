<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 560" width="200" height="560">
  <!-- SASHA "The Fierce One" — simple geometric Bratz style -->
  <!-- Skin:#8B5E3C  Eyes:#784212  Lips:#C8956C  Hair:#2C1810 massive afro -->

  <!-- GROUND SHADOW -->
