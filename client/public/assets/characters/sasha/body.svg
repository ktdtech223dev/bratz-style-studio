  <path d="M128 292 Q129 320 130 345" fill="none" stroke="#F39C12" stroke-width="3" stroke-linecap="round"/>
  <!-- Shorts hem -->
  <path d="M70 345 Q80 352 100 353 Q120 352 130 345" fill="none" stroke="#C0392B" stroke-width="2"/>

