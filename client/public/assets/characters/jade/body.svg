<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 560" width="200" height="560">
  <!-- JADE "The Rebel" — simple geometric Bratz style -->
  <!-- Skin:#C68642  Eyes:#27AE60  Lips:#C0392B  Hair:#1a1a2e black bob with bangs -->

  <!-- GROUND SHADOW -->
  <ellipse cx="100" cy="548" rx="45" ry="8" fill="rgba(0,0,0,0.2)"/>

  <!-- 1. HAIR BACK (bob shape, behind head) -->
  <path d="M38 110 Q42 55 100 48 Q158 55 162 110 L160 215 Q150 230 140 225 Q148 195 148 150 L100 135 L52 150 Q52 195 60 225 Q50 230 40 215 Z" fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>

  <!-- 2. LEGS -->
  <rect x="80" y="340" width="18" height="170" rx="9" fill="#C68642" stroke="#111" stroke-width="2"/>
  <rect x="102" y="340" width="18" height="170" rx="9" fill="#C68642" stroke="#111" stroke-width="2"/>

  <!-- 3. FEET -->
  <ellipse cx="87" cy="516" rx="18" ry="9" fill="#C68642" stroke="#111" stroke-width="2"/>
  <ellipse cx="113" cy="516" rx="18" ry="9" fill="#C68642" stroke="#111" stroke-width="2"/>

  <!-- 4. BODY TORSO -->
  <path d="M75 220 Q70 250 72 290 Q80 320 100 325 Q120 320 128 290 Q130 250 125 220 Q115 215 100 214 Q85 215 75 220 Z" fill="#C68642" stroke="#111" stroke-width="2.5"/>

  <!-- 5. ARMS -->
  <rect x="58" y="222" width="16" height="85" rx="8" fill="#C68642" stroke="#111" stroke-width="2" transform="rotate(-5 66 260)"/>
  <rect x="126" y="222" width="16" height="85" rx="8" fill="#C68642" stroke="#111" stroke-width="2" transform="rotate(5 134 260)"/>

  <!-- 6. PANTS / WIDE-LEG TROUSERS (Jade's signature style) -->
  <path d="M72 290 Q68 320 66 365 Q80 370 100 370 Q120 370 134 365 Q132 320 128 290 Q119 302 100 303 Q81 302 72 290 Z" fill="#2C3E50" stroke="#1a252f" stroke-width="1.5"/>
  <!-- Pants hem detail -->
  <path d="M66 365 Q80 372 100 373 Q120 372 134 365" fill="none" stroke="#4A6278" stroke-width="2"/>
  <!-- Pants crease line -->
  <path d="M90 300 L88 365" fill="none" stroke="#4A6278" stroke-width="1"/>
  <path d="M110 300 L112 365" fill="none" stroke="#4A6278" stroke-width="1"/>
  <!-- Wide leg flare over legs -->
  <path d="M80 340 Q74 390 72 510 Q80 516 87 514 Q86 410 86 340" fill="#2C3E50" stroke="#1a252f" stroke-width="1.5"/>
  <path d="M120 340 Q126 390 128 510 Q120 516 113 514 Q114 410 114 340" fill="#2C3E50" stroke="#1a252f" stroke-width="1.5"/>

  <!-- 7. CROP TOP — edgy green/teal with asymmetric detail -->
  <path d="M75 220 Q70 252 72 272 Q80 282 100 283 Q120 282 128 272 Q130 252 125 220 Q115 215 100 214 Q85 215 75 220 Z" fill="#27AE60" stroke="#1a7a42" stroke-width="1.5"/>
  <!-- Diagonal stripe detail -->
  <path d="M80 220 L118 272" fill="none" stroke="#1a7a42" stroke-width="2.5" opacity="0.5"/>
  <!-- Neckline -->
  <path d="M82 218 Q100 213 118 218" fill="none" stroke="#1a7a42" stroke-width="2"/>
  <!-- Belt line -->
  <path d="M74 268 Q100 275 126 268" fill="none" stroke="#1a7a42" stroke-width="2"/>

  <!-- 8. NECK -->
  <rect x="91" y="200" width="18" height="24" rx="7" fill="#C68642" stroke="#111" stroke-width="2"/>

  <!-- 9. HEAD -->
  <ellipse cx="100" cy="145" rx="68" ry="72" fill="#C68642" stroke="#111" stroke-width="2.5"/>

  <!-- 10. CHEEKS -->
  <ellipse cx="72" cy="168" rx="14" ry="8" fill="#FFB6C1" opacity="0.4"/>
  <ellipse cx="128" cy="168" rx="14" ry="8" fill="#FFB6C1" opacity="0.4"/>

  <!-- 11. EYEBROWS — jade has bold arched brows -->
  <path d="M73 138 Q82 132 91 136" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  <path d="M109 136 Q118 132 127 138" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>

  <!-- 12. EYES — LEFT -->
  <ellipse cx="83" cy="155" rx="16" ry="13" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="83" cy="157" rx="11" ry="11" fill="#27AE60"/>
  <circle cx="83" cy="157" r="5" fill="#1a1a1a"/>
  <circle cx="87" cy="153" r="3" fill="white"/>
  <path d="M67 148 Q75 140 83 142 Q91 140 99 148 Q93 143 83 144 Q73 143 67 148 Z" fill="#111"/>
  <path d="M97 146 Q103 140 106 144 Q105 147 99 149 Z" fill="#111"/>

  <!-- 12. EYES — RIGHT -->
  <ellipse cx="117" cy="155" rx="16" ry="13" fill="white" stroke="#111" stroke-width="2"/>
  <ellipse cx="117" cy="157" rx="11" ry="11" fill="#27AE60"/>
  <circle cx="117" cy="157" r="5" fill="#1a1a1a"/>
  <circle cx="121" cy="153" r="3" fill="white"/>
  <path d="M101 148 Q109 140 117 142 Q125 140 133 148 Q127 143 117 144 Q107 143 101 148 Z" fill="#111"/>
  <path d="M131 146 Q137 140 140 144 Q139 147 133 149 Z" fill="#111"/>

  <!-- 13. NOSE -->
  <path d="M96 170 Q100 174 104 170" fill="none" stroke="#8B5E28" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 14. LIPS — deep red -->
  <path d="M86 182 Q90 178 100 180 Q110 178 114 182 Q108 183 100 184 Q92 183 86 182 Z" fill="#C0392B" stroke="#111" stroke-width="1.5"/>
  <path d="M86 182 Q88 192 100 194 Q112 192 114 182 Q108 183 100 184 Q92 183 86 182 Z" fill="#C0392B" stroke="#111" stroke-width="1.5"/>
  <ellipse cx="100" cy="188" rx="7" ry="3" fill="white" opacity="0.4"/>

  <!-- 15. HAIR FRONT — thick straight bangs (KEY feature) -->
  <!-- Bangs block — covers forehead -->
  <rect x="40" y="90" width="120" height="52" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>
  <!-- Bangs bottom edge slightly curved -->
  <path d="M40 142 Q100 148 160 142" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <!-- Hair sheen line on bangs -->
  <path d="M55 98 Q100 94 145 98" fill="none" stroke="#3a3a5e" stroke-width="2.5" opacity="0.7"/>

  <!-- 16. SHOES — edgy platform boots in black/green -->
  <!-- Left boot -->
  <rect x="72" y="506" width="28" height="18" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <ellipse cx="87" cy="516" rx="18" ry="7" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <!-- Boot accent stripe -->
  <path d="M74 510 L98 510" stroke="#27AE60" stroke-width="2" stroke-linecap="round"/>
  <!-- Right boot -->
  <rect x="100" y="506" width="28" height="18" rx="5" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <ellipse cx="113" cy="516" rx="18" ry="7" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <path d="M102 510 L126 510" stroke="#27AE60" stroke-width="2" stroke-linecap="round"/>

</svg>
