<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2d78"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe44d"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="20" y="20" width="472" height="472" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Stylized B letter -->
  <text x="256" y="365" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="350" font-weight="bold" font-style="italic" fill="url(#gold)" filter="url(#shadow)">B</text>
  <!-- Sparkle star top-right -->
  <g transform="translate(395, 100)" fill="#00e5ff">
    <polygon points="0,-32 8,-8 32,0 8,8 0,32 -8,8 -32,0 -8,-8"/>
    <polygon points="0,-20 4,-4 20,0 4,4 0,20 -4,4 -20,0 -4,-4" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- Small secondary sparkle -->
  <g transform="translate(420, 150) scale(0.5)" fill="#00e5ff" opacity="0.7">
    <polygon points="0,-20 5,-5 20,0 5,5 0,20 -5,5 -20,0 -5,-5"/>
  </g>
  <!-- Tiny third sparkle -->
  <g transform="translate(370, 135) scale(0.3)" fill="#00e5ff" opacity="0.5">
    <polygon points="0,-20 5,-5 20,0 5,5 0,20 -5,5 -20,0 -5,-5"/>
  </g>
</svg>
